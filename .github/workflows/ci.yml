name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Python build frontend
        # vendor/jpoke (scripts/build-master-data) の wheel ビルドに `python -m build` を使う。
        run: pip install build
      - run: npm ci
      - run: npm test
      - run: npm run build

  e2e:
    # Phase 2-5: jpoke ネイティブ実行とブラウザ(Chromium上のPyodide)実行の等価性回帰テスト。
    # `npm run build` (wheelビルド含む) 後に `astro preview` で静的アセット一式を配信し、
    # Playwrightで実ブラウザから src/lib/pyodide-engine.ts の計算結果を検証する。
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Python build frontend
        run: pip install build
      - run: npm ci
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
      - name: Run E2E regression tests (build → preview → Playwright)
        run: npm run test:e2e

  migrations:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - name: Stub Supabase auth schema
        # poke-commons はv1まではログイン無しの完全匿名サービスで、マイグレーション
        # (migrations/001_initial.sql〜003_grant_table_privileges.sql) は auth.users テーブルや
        # auth.uid() のような Supabase 固有機能には依存しなかった。v2(migrations/
        # 004_owned_pokemon.sql〜005_owned_pokemon_rls.sql)で育成済みポケモン管理機能向けに
        # auth.uid() ベースの本人限定RLSポリシーを初めて導入したため、DDL検証に必要な最小限の
        # auth スキーマ・auth.users テーブル・auth.uid() 関数を用意する(実際の認可挙動はここでは
        # 検証しない。RLSポリシーの実地検証は後続の「RLSポリシーテスト」ステップで行う)。
        # あわせて、003番以降が GRANT 文で参照する anon/authenticated/service_role ロール
        # (旧「Stub Supabase roles」ステップの内容)もここで一本化して作成する。
        run: |
          PGPASSWORD=postgres psql -h localhost -U postgres -d postgres <<'SQL'
            CREATE SCHEMA IF NOT EXISTS auth;
            CREATE TABLE IF NOT EXISTS auth.users (
              id uuid PRIMARY KEY,
              email text,
              raw_user_meta_data jsonb DEFAULT '{}'::jsonb
            );

            DO $$ BEGIN
              IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = 'anon') THEN CREATE ROLE anon; END IF;
              IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = 'authenticated') THEN CREATE ROLE authenticated; END IF;
              IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = 'service_role') THEN CREATE ROLE service_role; END IF;
            END $$;

            CREATE OR REPLACE FUNCTION auth.uid() RETURNS uuid LANGUAGE sql STABLE AS $$ SELECT NULL::uuid $$;
SQL
      - name: Apply migrations to a fresh database
        run: npm run migrate
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres
      - name: Run RLS policy tests (owned_pokemon / opponent_notes)
        # migrations/004・005 で追加した本人限定RLSポリシーの実地テスト。auth.uid() をGUCベースの
        # 実装に差し替えたうえで2ユーザーを切り替え、他人の行にアクセスできないことを検証する
        # (詳細はテストファイル先頭のコメント参照)。
        run: node --test tests/db/owned-pokemon-rls.test.ts
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres
          RUN_DB_TESTS: '1'
